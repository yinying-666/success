<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>在线记事本 - 课程结课作业</title>
    <style>
        body {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            font-family: "微软雅黑";
            background: #f6f8fa;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 10px #ddd;
        }
        h1 {
            text-align: center;
            color: #222;
        }
        .form-item {
            margin: 15px 0;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 22px;
            background: #2574d9;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .note-item {
            border-left: 4px #2574d9 solid;
            padding: 12px 15px;
            background: #f7fbff;
            margin: 12px 0;
        }
        .api-tip {
            margin-top: 30px;
            padding: 12px;
            background: #fefefe;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>简易在线记事本</h1>
        <!-- 新增笔记表单 -->
        <form method="post">
            <div class="form-item">
                <label>笔记标题</label>
                <input type="text" name="title" required placeholder="输入标题">
            </div>
            <div class="form-item">
                <label>笔记内容</label>
                <textarea rows="4" name="content" required placeholder="输入内容"></textarea>
            </div>
            <button type="submit">保存笔记</button>
        </form>

        <hr style="margin:25px 0;">
        <h3>我的全部笔记</h3>
        {% if notes|length == 0 %}
            <p>暂无笔记，上方添加第一条笔记</p>
        {% else %}
            {% for item in notes %}
                <div class="note-item">
                    <strong>{{ item.title }}</strong>
                    <p>{{ item.content }}</p>
                </div>
            {% endfor %}
        {% endif %}

        <!-- 学校API状态展示 -->
        <div class="api-tip">
            <h4>学校API接口状态</h4>
            <p>{{ api_status }}</p>
            <p>接口返回数据：{{ api_data }}</p>
        </div>
    </div>
</body>
</html>
